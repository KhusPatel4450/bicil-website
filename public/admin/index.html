<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>BICIL — Content Manager</title>
  </head>
  <body>
    <script>
      // Step 1: receive from BroadcastChannel and re-dispatch as window message
      var _bc = new BroadcastChannel('decap_cms_auth');
      _bc.onmessage = function(e) {
        console.log('[BC] received:', JSON.stringify(e.data).slice(0, 80));
        if (e.data && e.data.msg) {
          console.log('[BC] re-dispatching to window...');
          window.postMessage(e.data.msg, window.location.origin);
          console.log('[BC] dispatched.');
        }
        _bc.close();
      };

      // Step 2: capture-phase listener to see if the window message arrives
      // (runs before Decap CMS's listener, cannot be stopped)
      window.addEventListener('message', function(e) {
        if (typeof e.data === 'string' && e.data.startsWith('authorization')) {
          console.log('[WIN-CAPTURE] auth message intercepted:', e.data.slice(0, 80));
        }
      }, true);
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
