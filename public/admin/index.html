<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>BICIL — Content Manager</title>
  </head>
  <body>
    <script>
      // Receive auth token from OAuth popup via BroadcastChannel,
      // then re-dispatch as a window message so Decap CMS picks it up.
      var _bc = new BroadcastChannel('decap_cms_auth');
      _bc.onmessage = function(e) {
        if (e.data && e.data.msg) {
          window.postMessage(e.data.msg, window.location.origin);
        }
        _bc.close();
      };
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
