  <body>
    <script>
      // Intercept window.open so we can see what URL the CMS opens for auth
      var _open = window.open;
      window.open = function() {
        console.log('[OPEN] popup URL:', arguments[0]);
        return _open.apply(this, arguments);
      };
    </script>

  </body>
